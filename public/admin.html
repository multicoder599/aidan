<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviator Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ===== LANDING PAGE (same as predictor) ===== */
    .landing-page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      position: fixed;
      inset: 0;
      z-index: 2000;
      overflow-y: auto;
    }
    .landing-header {
      background: #e53935;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
    }
    .landing-hero {
      position: relative;
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .landing-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(229,57,53,0.3) 0%, transparent 70%);
    }
    .landing-hero img {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(229,57,53,0.8));
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    .landing-choose-btn {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      padding: 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    .landing-sites-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0 16px 40px;
      max-width: 500px;
      margin: 0 auto;
    }
    .landing-site-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      aspect-ratio: 1;
    }
    .landing-site-item:hover {
      background: rgba(229,57,53,0.1);
      border-color: rgba(229,57,53,0.3);
      transform: translateY(-2px);
    }
    .landing-site-img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
    }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
    }
    .admin-panel.active { display: flex; }
    .admin-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .admin-header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #e50539;
      text-transform: uppercase;
    }
    .admin-header p {
      font-size: 0.75rem;
      color: #5e6266;
      margin-top: 4px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, #141c28, #0e1621);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.8rem;
      color: #9ea0a3;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .game-state-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .game-state-label {
      font-size: 0.8rem;
      color: #5e6266;
    }
    .game-state-value {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      background: rgba(255,255,255,0.05);
    }
    .game-state-value.waiting { color: #f5a623; }
    .game-state-value.flying { color: #e50539; }
    .game-state-value.crashed { color: #ef4444; }
    .game-state-value.cooldown { color: #3b82f6; }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      color: #9ea0a3;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #e50539;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(180deg, #e50539, #b0042d);
      color: #fff;
      box-shadow: 0 4px 16px rgba(229,5,57,0.3);
    }
    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #9ea0a3;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .next-round-info {
      background: rgba(40, 169, 9, 0.08);
      border: 1px solid rgba(40, 169, 9, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .next-round-info .label {
      font-size: 0.7rem;
      color: #9ea0a3;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .next-round-info .value {
      font-size: 2rem;
      font-weight: 900;
      color: #28a909;
    }
    .log-section {
      width: 100%;
      max-width: 440px;
    }
    .log-title {
      font-size: 0.75rem;
      color: #5e6266;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .log-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .log-entry .time { color: #5e6266; font-size: 0.7rem; }
    .log-entry .round { color: #9ea0a3; font-weight: 600; }
    .log-entry .mult { font-weight: 800; color: #fff; }
    .log-entry .mult.admin { color: #f5a623; }
    .log-entry .mult.actual { color: #41b0ee; }
    .conn-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px;
      background: rgba(0,0,0,0.8);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #5e6266;
    }
    .conn-bar.connected { color: #28a909; }
    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #5e6266;
    }
    .conn-bar.connected .conn-dot { background: #28a909; }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 8px;
    }
    .status-badge.success { background: rgba(40,169,9,0.2); color: #42c766; }
    .status-badge.error { background: rgba(229,5,57,0.2); color: #ff6b8a; }
    .back-to-sites {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 100;
      transition: all 0.2s;
    }
    .back-to-sites:hover {
      background: rgba(229,57,53,0.2);
      border-color: rgba(229,57,53,0.4);
    }
  </style>
<base target="_blank">
<base target="_blank">
</head>
<body>

  <!-- ===== LANDING PAGE ===== -->
  <div class="landing-page" id="landingPage">
    <div class="landing-header">AVIATOR ADMIN PANEL</div>
    <div class="landing-hero">
      <img src="plane.png" alt="">
    </div>
    <button class="landing-choose-btn">Choose Your Betting Site</button>
    <div class="landing-sites-grid" id="landingSitesGrid"></div>
  </div>

  <!-- ===== ADMIN PANEL ===== -->
  <div class="admin-panel" id="adminPanel">
    <button class="back-to-sites" onclick="showLanding()">&#8592; Back to Sites</button>
    <div class="admin-header">
      <h1>Aviator Admin</h1>
      <p>Manual Round Control</p>
    </div>

    <div class="card">
      <div class="card-title">Game Status</div>
      <div class="game-state-row">
        <span class="game-state-label">Current State</span>
        <span class="game-state-value" id="gameStateValue">--</span>
      </div>
      <div class="game-state-row">
        <span class="game-state-label">Current Round</span>
        <span class="game-state-value" id="currentRound">--</span>
      </div>
      <div class="game-state-row">
        <span class="game-state-label">Live Multiplier</span>
        <span class="game-state-value" id="liveMultiplier">--</span>
      </div>
      <div class="game-state-row">
        <span class="game-state-label">Next Crash Point</span>
        <span class="game-state-value" id="nextCrashPoint" style="color:#f5a623;">--</span>
      </div>
    </div>

    <div class="next-round-info" id="nextRoundInfo" style="display:none;">
      <div class="label">Next Round Set To</div>
      <div class="value" id="nextRoundValue">--</div>
    </div>

    <div class="card">
      <div class="card-title">Set Next Round</div>
      <div class="input-group">
        <label>Crash Multiplier (e.g. 2.50, 15.00, 1.05)</label>
        <input type="number" id="multiplierInput" step="0.01" min="1.00" placeholder="Enter multiplier" value="2.00">
      </div>
      <button class="btn btn-primary" id="setBtn">Set Next Round</button>
      <button class="btn btn-secondary" id="randomBtn">Auto Generate Random</button>
      <div id="setStatus" style="margin-top:8px; text-align:center; font-size:0.8rem;"></div>
    </div>

    <div class="log-section">
      <div class="log-title">Action Log</div>
      <div id="logList"></div>
    </div>

    <div class="conn-bar" id="connBar">
      <span class="conn-dot"></span>
      <span id="connText">Waiting for game connection...</span>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3041' : 'https://aviatorguru.site';
    const ADMIN_SECRET = 'aviator-admin-2024';

    const sites = [
      'SportyBet', 'Betway', 'LottoStar', 'MSport', '1win', 'HollywoodBets',
      '1xBet', 'PremierBet', 'PinUpBet', 'MelBet', 'SuperBet', 'BetKing',
      'Bwin', 'WilliamHill', 'PaddyPower', 'Bet365', 'SkyBet', 'Betfair',
      '888sport', 'Unibet', 'Mwos', '22Bet', 'DafaBet', 'Betpawa',
      'Stake', 'Adjarabet', 'Cloudbet', 'Luckystar', '10BET', 'GGBET', 'SpinCity'
    ];

    // ===== LANDING PAGE =====
    function renderLandingSites() {
      const grid = document.getElementById('landingSitesGrid');
      grid.innerHTML = sites.map(s => {
        const imgName = s.toLowerCase().replace(/[^a-z0-9]/g, '') + '.png';
        return `
          <div class="landing-site-item" onclick="enterAdmin('${s}')">
            <img src="images/${imgName}" alt="${s}" class="landing-site-img" onerror="this.style.display='none'; this.parentElement.style.background='rgba(229,57,53,0.1)'">
          </div>
        `;
      }).join('');
    }
    renderLandingSites();

    function enterAdmin(siteName) {
      document.getElementById('landingPage').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      // Start polling once admin is entered
      if (!pollInterval) {
        pollInterval = setInterval(pollGameState, 1000);
        pollGameState();
      }
    }

    function showLanding() {
      document.getElementById('landingPage').style.display = 'block';
      document.getElementById('adminPanel').classList.remove('active');
    }

    // ===== ADMIN PANEL =====
    const els = {
      gameStateValue: document.getElementById('gameStateValue'),
      currentRound: document.getElementById('currentRound'),
      liveMultiplier: document.getElementById('liveMultiplier'),
      nextCrashPoint: document.getElementById('nextCrashPoint'),
      nextRoundInfo: document.getElementById('nextRoundInfo'),
      nextRoundValue: document.getElementById('nextRoundValue'),
      multiplierInput: document.getElementById('multiplierInput'),
      setBtn: document.getElementById('setBtn'),
      randomBtn: document.getElementById('randomBtn'),
      logList: document.getElementById('logList'),
      connBar: document.getElementById('connBar'),
      connText: document.getElementById('connText'),
      setStatus: document.getElementById('setStatus')
    };

    let logs = [];
    let connected = false;
    let pollInterval = null;

    function addLog(text, round, type) {
      const time = new Date().toLocaleTimeString();
      logs.unshift({ time, text, round, type });
      if (logs.length > 15) logs.pop();
      renderLogs();
    }

    function renderLogs() {
      els.logList.innerHTML = logs.map(l => {
        const typeClass = l.type === 'admin' ? 'admin' : (l.type === 'actual' ? 'actual' : '');
        return `<div class="log-entry">
          <span class="time">${l.time}</span>
          <span class="round">${l.round ? 'Round #' + l.round : ''}</span>
          <span class="mult ${typeClass}">${l.text}</span>
        </div>`;
      }).join('');
    }

    function updateGameState(state, round, multiplier, nextCrash) {
      els.gameStateValue.textContent = state ? state.toUpperCase() : '--';
      els.gameStateValue.className = 'game-state-value ' + (state || '');
      els.currentRound.textContent = round > 0 ? '#' + round : '--';
      els.liveMultiplier.textContent = multiplier ? multiplier.toFixed(2) + 'x' : '--';
      els.nextCrashPoint.textContent = nextCrash ? nextCrash.toFixed(2) + 'x' : '--';
      if (!connected) {
        connected = true;
        els.connBar.classList.add('connected');
        els.connText.textContent = 'Connected to server';
      }
    }

    function generateRandom() {
      const r = Math.random();
      let val;
      if (r < 0.35) val = 1.00 + Math.random() * 1.50;
      else if (r < 0.65) val = 2.50 + Math.random() * 4.00;
      else if (r < 0.85) val = 7.00 + Math.random() * 8.00;
      else val = 15.00 + Math.random() * 85.00;
      return parseFloat(val.toFixed(2));
    }

    async function pollGameState() {
      try {
        const res = await fetch(`${API_BASE}/api/prediction`);
        const data = await res.json();
        updateGameState(data.gameState, data.roundNumber, data.multiplier, data.prediction);

        if (data.gameState === 'crashed' && data.prediction) {
          addLog('CRASH ' + data.prediction.toFixed(2) + 'x', data.roundNumber, 'actual');
        }
      } catch (e) {
        console.warn('Poll failed:', e);
      }
    }

    els.setBtn.addEventListener('click', async () => {
      const val = parseFloat(els.multiplierInput.value);
      if (isNaN(val) || val < 1.00) {
        alert('Enter a valid multiplier (minimum 1.00)');
        return;
      }

      els.setBtn.disabled = true;
      els.setBtn.textContent = 'Setting...';
      els.setStatus.innerHTML = '';

      try {
        const res = await fetch(`${API_BASE}/api/admin/crash-point`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ crashPoint: val, secret: ADMIN_SECRET })
        });
        const data = await res.json();

        if (data.success) {
          els.nextRoundInfo.style.display = 'block';
          els.nextRoundValue.textContent = val.toFixed(2) + 'x';
          addLog('SET ' + val.toFixed(2) + 'x', null, 'admin');
          els.setStatus.innerHTML = '<span class="status-badge success">SAVED TO SERVER</span>';
        } else {
          els.setStatus.innerHTML = '<span class="status-badge error">' + (data.message || 'Failed') + '</span>';
        }
      } catch (err) {
        console.error('Set failed:', err);
        els.setStatus.innerHTML = '<span class="status-badge error">Network error</span>';
      }

      els.setBtn.disabled = false;
      els.setBtn.textContent = 'Set Next Round';
    });

    els.randomBtn.addEventListener('click', () => {
      const val = generateRandom();
      els.multiplierInput.value = val.toFixed(2);
      els.nextRoundInfo.style.display = 'block';
      els.nextRoundValue.textContent = val.toFixed(2) + 'x';
      addLog('AUTO ' + val.toFixed(2) + 'x', null, 'admin');
    });
  </script>
</body>
</html>
