<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviator Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ===== LANDING PAGE ===== */
    .landing-page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      position: fixed;
      inset: 0;
      z-index: 2000;
      overflow-y: auto;
    }
    .landing-header {
      background: #e53935;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
    }
    .landing-hero {
      position: relative;
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .landing-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(229,57,53,0.3) 0%, transparent 70%);
    }
    .landing-hero img {
      width: 280px;
      height: auto;
      max-height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(229,57,53,0.8));
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    .landing-choose-btn {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      padding: 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    .landing-sites-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px 40px;
      max-width: 500px;
      margin: 0 auto;
    }
    .landing-site-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(229,57,53,0.15), inset 0 0 12px rgba(229,57,53,0.05);
    }
    .landing-site-item:hover {
      background: rgba(229,57,53,0.15);
      border-color: rgba(229,57,53,0.5);
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 0 20px rgba(229,57,53,0.4), 0 0 40px rgba(229,57,53,0.2), inset 0 0 15px rgba(229,57,53,0.1);
    }
    .landing-site-item:active {
      transform: translateY(-1px) scale(0.98);
    }
    .landing-site-img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
      margin-bottom: 6px;
      pointer-events: none;
    }
    .landing-site-name {
      font-size: 0.65rem;
      color: #aaa;
      text-align: center;
      font-weight: 500;
      line-height: 1.2;
      pointer-events: none;
    }
    .landing-site-item:hover .landing-site-name {
      color: #fff;
    }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
    }
    .admin-panel.active { display: flex; }
    .admin-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .admin-header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #e50539;
      text-transform: uppercase;
    }
    .admin-header p {
      font-size: 0.75rem;
      color: #5e6266;
      margin-top: 4px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, #141c28, #0e1621);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.8rem;
      color: #9ea0a3;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* GREEN CIRCLE */
    .next-round-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(135deg, #28a909, #1e8a07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(40, 169, 9, 0.5), 0 0 80px rgba(40, 169, 9, 0.3), inset 0 0 20px rgba(255,255,255,0.1);
      border: 4px solid rgba(255,255,255,0.15);
      animation: pulse-green 2.5s ease-in-out infinite;
      transition: transform 0.3s ease;
      margin: 0 auto;
    }
    .next-round-circle:hover {
      transform: scale(1.06);
    }
    .next-round-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .next-round-value {
      font-size: 2.6rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    @keyframes pulse-green {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(40,169,9,0.5), 0 0 80px rgba(40,169,9,0.3); }
      50% { transform: scale(1.04); box-shadow: 0 0 60px rgba(40,169,9,0.7), 0 0 100px rgba(40,169,9,0.4); }
    }

    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      color: #9ea0a3;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #e50539;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(180deg, #e50539, #b0042d);
      color: #fff;
      box-shadow: 0 4px 16px rgba(229,5,57,0.3);
    }
    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #9ea0a3;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .next-round-info {
      background: rgba(40, 169, 9, 0.08);
      border: 1px solid rgba(40, 169, 9, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .next-round-info .label {
      font-size: 0.7rem;
      color: #9ea0a3;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .next-round-info .value {
      font-size: 2rem;
      font-weight: 900;
      color: #28a909;
    }
    .log-section {
      width: 100%;
      max-width: 440px;
    }
    .log-title {
      font-size: 0.75rem;
      color: #5e6266;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .log-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .log-entry .time { color: #5e6266; font-size: 0.7rem; }
    .log-entry .round { color: #9ea0a3; font-weight: 600; }
    .log-entry .mult { font-weight: 800; color: #fff; }
    .log-entry .mult.admin { color: #f5a623; }
    .log-entry .mult.actual { color: #41b0ee; }
    .conn-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px;
      background: rgba(0,0,0,0.8);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #5e6266;
    }
    .conn-bar.connected { color: #28a909; }
    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #5e6266;
    }
    .conn-bar.connected .conn-dot { background: #28a909; }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 8px;
    }
    .status-badge.success { background: rgba(40,169,9,0.2); color: #42c766; }
    .status-badge.error { background: rgba(229,5,57,0.2); color: #ff6b8a; }
    .back-to-sites {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 100;
      transition: all 0.2s;
    }
    .back-to-sites:hover {
      background: rgba(229,57,53,0.2);
      border-color: rgba(229,57,53,0.4);
    }
  </style>

<base target="_blank">
</head>
<body>

  <!-- ===== LANDING PAGE ===== -->
  <div class="landing-page" id="landingPage">
    <div class="landing-header">AVIATOR ADMIN PANEL</div>
    <div class="landing-hero">
      <img src="plane.png" alt="plane" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=font-size:3rem;color:#e53935;>&#9992;</div>'">
    </div>
    <button class="landing-choose-btn">Choose Your Betting Site</button>
    <div class="landing-sites-grid" id="landingSitesGrid"></div>
  </div>

  <!-- ===== ADMIN PANEL ===== -->
  <div class="admin-panel" id="adminPanel">
    <button class="back-to-sites" onclick="showLanding()">&#8592; Back </button>
    <div class="admin-header">
      <h1>Aviator Admin</h1>
      <p>Manual Round Control</p>
    </div>

    <!-- BIG GREEN CIRCLE -->
    <div class="card" style="display:flex;justify-content:center;align-items:center;padding:40px 24px;">
      <div class="next-round-circle" id="nextRoundCircle">
        <div class="next-round-label">NEXT ROUND</div>
        <div class="next-round-value" id="nextRoundDisplay">--</div>
      </div>
    </div>

    <div class="next-round-info" id="nextRoundInfo" style="display:none;">
      <div class="label">Next Round Set To</div>
      <div class="value" id="nextRoundValue">--</div>
    </div>

    <div class="card">
      <div class="card-title">Set Next Round</div>
      <div class="input-group">
        <label>Crash Multiplier (e.g. 2.50, 15.00, 1.05)</label>
        <input type="number" id="multiplierInput" step="0.01" min="1.00" placeholder="Enter multiplier" value="2.00">
      </div>
      <button class="btn btn-primary" id="setBtn">Set Next Round</button>
      <button class="btn btn-secondary" id="randomBtn">Auto Generate Random</button>
      <div id="setStatus" style="margin-top:8px; text-align:center; font-size:0.8rem;"></div>
      <div style="margin-top:10px; text-align:center; font-size:0.7rem; color:#5e6266;">
        Works even while the game is running — sets the upcoming round.
      </div>
    </div>

    <div class="log-section">
      <div class="log-title">Action Log</div>
      <div id="logList"></div>
    </div>

    <div class="conn-bar" id="connBar">
      <span class="conn-dot"></span>
      <span id="connText">Waiting for game connection...</span>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3041' : 'https://aviatorguru.site';
    const ADMIN_SECRET = 'aviator-admin-2024';

    const sites = [
      {name:'SportyBet', img:'sportybet.png'},
      {name:'Betway', img:'betway.png'},
      {name:'LottoStar', img:'lottostar.png'},
      {name:'MSport', img:'msport.png'},
      {name:'1win', img:'1win.png'},
      {name:'Hollywood', img:'hollywoodbets.png'},
      {name:'1xBet', img:'1xbet.png'},
      {name:'PremierBet', img:'premierbet.png'},
      {name:'Pin-Up', img:'pinupbet.png'},
      {name:'MelBet', img:'melbet.png'},
      {name:'SuperBet', img:'superbet.png'},
      {name:'BetKing', img:'betking.png'},
      {name:'Bwin', img:'bwin.png'},
      {name:'WilliamHill', img:'williamhill.png'},
      {name:'PaddyPower', img:'paddypower.png'},
      {name:'Bet365', img:'bet365.png'},
      {name:'SkyBet', img:'skybet.png'},
      {name:'Betfair', img:'betfair.png'},
      {name:'888sport', img:'888sport.png'},
      {name:'Unibet', img:'unibet.png'},
      {name:'Mwos', img:'mwos.png'},
      {name:'22Bet', img:'22bet.png'},
      {name:'DafaBet', img:'dafabet.png'},
      {name:'Betpawa', img:'betpawa.png'},
      {name:'Stake', img:'stake.png'},
      {name:'Adjarabet', img:'adjarabet.png'},
      {name:'Cloudbet', img:'cloudbet.png'},
      {name:'Luckystar', img:'luckystar.png'},
      {name:'10BET', img:'10bet.png'},
      {name:'GGBET', img:'ggbet.png'},
      {name:'SpinCity', img:'spincity.png'}
    ];

    function renderLandingSites() {
      const grid = document.getElementById('landingSitesGrid');
      grid.innerHTML = sites.map(s => `
        <div class="landing-site-item" onclick="enterAdmin('${s.name}')">
          <img src="images/${s.img}" alt="${s.name}" class="landing-site-img" onerror="this.style.display='none'; this.parentElement.style.background='rgba(229,57,53,0.2)'; this.parentElement.style.borderColor='rgba(229,57,53,0.5)'">
          <span class="landing-site-name">${s.name}</span>
        </div>
      `).join('');
    }
    renderLandingSites();

    function enterAdmin(siteName) {
      document.getElementById('landingPage').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      if (!pollInterval) {
        pollInterval = setInterval(pollGameState, 1000);
        pollGameState();
      }
    }

    function showLanding() {
      document.getElementById('landingPage').style.display = 'block';
      document.getElementById('adminPanel').classList.remove('active');
    }

    const els = {
      nextRoundDisplay: document.getElementById('nextRoundDisplay'),
      nextRoundInfo: document.getElementById('nextRoundInfo'),
      nextRoundValue: document.getElementById('nextRoundValue'),
      multiplierInput: document.getElementById('multiplierInput'),
      setBtn: document.getElementById('setBtn'),
      randomBtn: document.getElementById('randomBtn'),
      logList: document.getElementById('logList'),
      connBar: document.getElementById('connBar'),
      connText: document.getElementById('connText'),
      setStatus: document.getElementById('setStatus')
    };

    let logs = [];
    let connected = false;
    let pollInterval = null;

    function addLog(text, round, type) {
      const time = new Date().toLocaleTimeString();
      logs.unshift({ time, text, round, type });
      if (logs.length > 15) logs.pop();
      renderLogs();
    }

    function renderLogs() {
      els.logList.innerHTML = logs.map(l => {
        const typeClass = l.type === 'admin' ? 'admin' : (l.type === 'actual' ? 'actual' : '');
        return `<div class="log-entry">
          <span class="time">${l.time}</span>
          <span class="round">${l.round ? 'Round #' + l.round : ''}</span>
          <span class="mult ${typeClass}">${l.text}</span>
        </div>`;
      }).join('');
    }

    function updateGameState(state, round, multiplier, nextCrash) {
      // Big green circle shows the next round crash point
      els.nextRoundDisplay.textContent = nextCrash ? nextCrash.toFixed(2) + 'x' : '--';

      if (!connected) {
        connected = true;
        els.connBar.classList.add('connected');
        els.connText.textContent = 'Connected to server';
      }
    }

    function generateRandom() {
      const r = Math.random();
      let val;
      if (r < 0.35) val = 1.00 + Math.random() * 1.50;
      else if (r < 0.65) val = 2.50 + Math.random() * 4.00;
      else if (r < 0.85) val = 7.00 + Math.random() * 8.00;
      else val = 15.00 + Math.random() * 85.00;
      return parseFloat(val.toFixed(2));
    }

    async function pollGameState() {
      try {
        const res = await fetch(`${API_BASE}/api/prediction`);
        const data = await res.json();
        updateGameState(data.gameState, data.roundNumber, data.multiplier, data.prediction);
        if (data.gameState === 'crashed' && data.prediction) {
          addLog('CRASH ' + data.prediction.toFixed(2) + 'x', data.roundNumber, 'actual');
        }
      } catch (e) {
        console.warn('Poll failed:', e);
      }
    }

    els.setBtn.addEventListener('click', async () => {
      const val = parseFloat(els.multiplierInput.value);
      if (isNaN(val) || val < 1.00) {
        alert('Enter a valid multiplier (minimum 1.00)');
        return;
      }
      els.setBtn.disabled = true;
      els.setBtn.textContent = 'Setting...';
      els.setStatus.innerHTML = '';
      try {
        const res = await fetch(`${API_BASE}/api/admin/crash-point`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ crashPoint: val, secret: ADMIN_SECRET })
        });
        const data = await res.json();
        if (data.success) {
          els.nextRoundDisplay.textContent = val.toFixed(2) + 'x';
          els.nextRoundInfo.style.display = 'block';
          els.nextRoundValue.textContent = val.toFixed(2) + 'x';
          addLog('SET ' + val.toFixed(2) + 'x', null, 'admin');
          els.setStatus.innerHTML = '<span class="status-badge success">SAVED TO SERVER</span>';
        } else {
          els.setStatus.innerHTML = '<span class="status-badge error">' + (data.message || 'Failed') + '</span>';
        }
      } catch (err) {
        console.error('Set failed:', err);
        els.setStatus.innerHTML = '<span class="status-badge error">Network error</span>';
      }
      els.setBtn.disabled = false;
      els.setBtn.textContent = 'Set Next Round';
    });

    els.randomBtn.addEventListener('click', () => {
      const val = generateRandom();
      els.multiplierInput.value = val.toFixed(2);
      els.nextRoundDisplay.textContent = val.toFixed(2) + 'x';
      els.nextRoundInfo.style.display = 'block';
      els.nextRoundValue.textContent = val.toFixed(2) + 'x';
      addLog('AUTO ' + val.toFixed(2) + 'x', null, 'admin');
    });
  </script>
</body>
</html>
