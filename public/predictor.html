<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviator Predictor Pro v12.1.8</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .header {
      background: #e53935;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .hero {
      position: relative;
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(229,57,53,0.3) 0%, transparent 70%);
    }
    .plane-img {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(229,57,53,0.8));
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    .choose-btn {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      padding: 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    .sites-list {
      padding: 0 16px 100px;
      max-width: 500px;
      margin: 0 auto;
    }
    .site-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .site-item:hover { opacity: 0.8; }
    .site-logo {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
      background: rgba(255,255,255,0.05);
      padding: 4px;
    }
    .site-name {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
    }
    .telegram-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #e53935;
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
      z-index: 100;
    }
    .telegram-bar a {
      color: #fff;
      text-decoration: underline;
    }
    /* Activation Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: #111;
      border: 1px solid rgba(229,57,53,0.3);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .modal-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #fff;
    }
    .modal-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 2px solid #e53935;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .modal-input::placeholder { color: #666; }
    .modal-btns {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .modal-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 16px;
    }
    .btn-cancel { color: #e53935; }
    .btn-submit { color: #4caf50; font-weight: 600; }
    
    /* Predictor Screen */
    .predictor-screen {
      display: none;
      padding: 20px;
      text-align: center;
    }
    .predictor-screen.active { display: block; }
    .aviator-logo-box {
      border: 2px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      background: rgba(139,195,74,0.05);
    }
    .aviator-logo-box img {
      width: 200px;
      filter: drop-shadow(0 0 10px rgba(229,57,53,0.5));
    }
    .vpn-ring {
      width: 180px;
      height: 180px;
      border: 4px solid #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      position: relative;
    }
    .vpn-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: #8bc34a;
      animation: spin 2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vpn-text {
      color: #e53935;
      font-size: 1rem;
      font-weight: 600;
    }
    .start-btn {
      width: 200px;
      padding: 16px;
      background: #8bc34a;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .prediction-result {
      display: none;
      margin-top: 30px;
    }
    .prediction-result.active { display: block; }
    .pred-value {
      font-size: 4rem;
      font-weight: 900;
      color: #e53935;
      text-shadow: 0 0 30px rgba(229,57,53,0.5);
    }
    .pred-label {
      color: #888;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .back-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="header">AVIATOR PREDICTOR PRO v12.1.8</div>
  
  <!-- Site Selection Screen -->
  <div id="siteScreen">
    <div class="hero">
      <svg class="plane-img" viewBox="0 0 200 120" fill="none">
        <path d="M180 60 L140 40 L100 50 L40 20 L20 25 L50 55 L20 60 L50 65 L20 95 L40 100 L100 70 L140 80 Z" fill="#e53935" stroke="#ff5252" stroke-width="2"/>
        <ellipse cx="45" cy="60" rx="8" ry="20" fill="#fff" opacity="0.3" transform="rotate(-20 45 60)"/>
        <circle cx="165" cy="60" r="3" fill="#fff"/>
      </svg>
    </div>
    
    <button class="choose-btn" onclick="showActivation()">Choose Your Betting Site</button>
    
    <div class="sites-list" id="sitesList"></div>
  </div>

  <!-- Activation Modal -->
  <div class="modal-overlay" id="activationModal">
    <div class="modal-card">
      <div class="modal-title">Enter activation key</div>
      <input type="text" class="modal-input" id="activationInput" placeholder="Enter activation key" maxlength="20">
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="hideActivation()">Cancel</button>
        <button class="modal-btn btn-submit" onclick="submitActivation()">Submit</button>
      </div>
    </div>
  </div>

  <!-- Predictor Screen -->
  <div class="predictor-screen" id="predictorScreen">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="aviator-logo-box">
      <svg viewBox="0 0 200 80" fill="none">
        <path d="M20 40 L60 20 L100 35 L160 10 L180 15 L140 40 L180 65 L160 70 L100 45 L60 60 Z" fill="#e53935"/>
        <text x="100" y="75" text-anchor="middle" fill="#e53935" font-size="24" font-weight="bold" font-style="italic">Aviator</text>
      </svg>
    </div>
    <div class="vpn-ring">
      <span class="vpn-text">Connect VPN</span>
    </div>
    <button class="start-btn" onclick="startPrediction()">Start</button>
    <div style="color:#888; font-size:0.85rem;">Join our telegram <a href="https://t.me/startaviator" style="color:#fff;">@startaviator</a></div>
    
    <div class="prediction-result" id="predictionResult">
      <div class="pred-value" id="predValue">2.50x</div>
      <div class="pred-label">Predicted Multiplier</div>
      <div style="color:#4caf50; margin-top:10px; font-size:0.9rem;" id="predRound">Round #<span>--</span></div>
    </div>
  </div>

  <div class="telegram-bar">
    Telegram: <a href="https://t.me/startaviator">@startaviator</a>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3041' : 'https://aviatorguru.site';
    
    const sites = [
      { name: 'SportyBet', logo: '🔴' },
      { name: 'Betway', logo: '⚫' },
      { name: 'LottoStar', logo: '🌟' },
      { name: 'MSport', logo: '🟡' },
      { name: '1win', logo: '🔵' },
      { name: 'Hollywood Bets', logo: '🟣' },
      { name: '1xBet', logo: '🔵' },
      { name: 'PremierBet', logo: '🟢' },
      { name: 'Pin-Up Bet', logo: '🔴' },
      { name: 'MelBet', logo: '🟡' },
      { name: 'SuperBet', logo: '🔴' },
      { name: 'BetKing', logo: '🔵' },
      { name: 'Bwin', logo: '⚫' },
      { name: 'William Hill', logo: '🟡' },
      { name: 'Paddy Power', logo: '🟢' },
      { name: 'Bet365', logo: '🟢' },
      { name: 'SkyBet', logo: '🔵' },
      { name: 'Betfair', logo: '🟡' },
      { name: '888sport', logo: '🟠' },
      { name: 'Unibet', logo: '🟢' },
      { name: 'Mwos', logo: '🔵' },
      { name: '22 Bet', logo: '🔵' },
      { name: 'Dafa Bet', logo: '🔴' },
      { name: 'Betpawa', logo: '🟢' },
      { name: 'Stake', logo: '⚪' },
      { name: 'Adjarabet', logo: '🔴' },
      { name: 'Cloud bet', logo: '🔵' },
      { name: 'Luckystar', logo: '🌟' },
      { name: '10BET', logo: '⚫' },
      { name: 'GG.BET', logo: '🟡' },
      { name: 'Spin City', logo: '🔵' }
    ];

    function renderSites() {
      const list = document.getElementById('sitesList');
      list.innerHTML = sites.map(s => `
        <div class="site-item" onclick="showActivation('${s.name}')">
          <div class="site-logo" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">${s.logo}</div>
          <span class="site-name">${s.name}</span>
        </div>
      `).join('');
    }
    renderSites();

    let selectedSite = '';
    function showActivation(site) {
      selectedSite = site || '';
      document.getElementById('activationModal').classList.add('active');
      document.getElementById('activationInput').focus();
    }
    function hideActivation() {
      document.getElementById('activationModal').classList.remove('active');
      document.getElementById('activationInput').value = '';
    }
    function submitActivation() {
      const code = document.getElementById('activationInput').value.trim();
      if (!code) return;
      hideActivation();
      document.getElementById('siteScreen').style.display = 'none';
      document.getElementById('predictorScreen').classList.add('active');
      pollPrediction();
    }
    function goBack() {
      document.getElementById('predictorScreen').classList.remove('active');
      document.getElementById('siteScreen').style.display = 'block';
    }

    async function pollPrediction() {
      try {
        const res = await fetch(`${API_BASE}/api/prediction`);
        const data = await res.json();
        if (data.prediction && data.roundNumber) {
          document.getElementById('predValue').textContent = data.prediction.toFixed(2) + 'x';
          document.getElementById('predRound').querySelector('span').textContent = data.roundNumber;
          document.getElementById('predictionResult').classList.add('active');
        }
      } catch (e) {}
    }
    setInterval(pollPrediction, 2000);

    function startPrediction() {
      pollPrediction();
      document.querySelector('.vpn-ring').style.borderColor = '#4caf50';
      document.querySelector('.vpn-text').textContent = 'Connected';
      document.querySelector('.vpn-text').style.color = '#4caf50';
    }
  </script>
</body>
</html>
