<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviator Predictor Pro v12.1.8</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .header {
      background: #e53935;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .hero {
      position: relative;
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(229,57,53,0.3) 0%, transparent 70%);
    }
    .plane-img {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(229,57,53,0.8));
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    .choose-btn {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      padding: 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0 16px 40px;
      max-width: 500px;
      margin: 0 auto;
    }
    .site-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      aspect-ratio: 1;
    }
    .site-item:hover {
      background: rgba(229,57,53,0.1);
      border-color: rgba(229,57,53,0.3);
      transform: translateY(-2px);
    }
    .site-img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
    }

    /* Activation Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: #111;
      border: 1px solid rgba(229,57,53,0.3);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .modal-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #fff;
    }
    .modal-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 2px solid #e53935;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .modal-input::placeholder { color: #666; }
    .modal-btns {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .modal-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 16px;
    }
    .btn-cancel { color: #e53935; }
    .btn-submit { color: #4caf50; font-weight: 600; }
    .key-error {
      color: #e53935;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    /* Predictor Screen */
    .predictor-screen {
      display: none;
      padding: 20px;
      text-align: center;
      min-height: 100vh;
    }
    .predictor-screen.active { display: block; }
    .aviator-logo-box {
      border: 2px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      background: rgba(139,195,74,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .aviator-logo-box img {
      width: 200px;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(229,57,53,0.5));
    }
    .vpn-ring {
      width: 180px;
      height: 180px;
      border: 4px solid #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      position: relative;
    }
    .vpn-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: #8bc34a;
      animation: spin 2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vpn-text {
      color: #e53935;
      font-size: 1rem;
      font-weight: 600;
    }
    .start-btn {
      width: 200px;
      padding: 16px;
      background: #8bc34a;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    .start-btn:hover { filter: brightness(1.1); }
    .start-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .prediction-result {
      display: none;
      margin-top: 30px;
    }
    .prediction-result.active { display: block; }
    .pred-value {
      font-size: 4rem;
      font-weight: 900;
      color: #e53935;
      text-shadow: 0 0 30px rgba(229,57,53,0.5);
    }
    .pred-label {
      color: #888;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .back-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
    }
    .error-msg {
      color: #e53935;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 20px;
      padding: 12px 20px;
      background: rgba(229,57,53,0.1);
      border: 1px solid rgba(229,57,53,0.3);
      border-radius: 10px;
      display: none;
    }
    .error-msg.active { display: inline-block; }
    .loading-spinner {
      display: none;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(139,195,74,0.2);
      border-top-color: #8bc34a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    .loading-spinner.active { display: block; }
  </style>
<base target="_blank">
</head>
<body>
  <div class="header">AVIATOR PREDICTOR PRO v12.1.8</div>

  <!-- Site Selection Screen -->
  <div id="siteScreen">
    <div class="hero">
      <img src="plane.png" alt="" class="plane-img">
    </div>

    <button class="choose-btn" onclick="showActivation()">Choose Your Betting Site</button>

    <div class="sites-grid" id="sitesGrid"></div>
  </div>

  <!-- Activation Modal -->
  <div class="modal-overlay" id="activationModal">
    <div class="modal-card">
      <div class="modal-title">Enter activation key</div>
      <input type="text" class="modal-input" id="activationInput" placeholder="Enter activation key" maxlength="20">
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="hideActivation()">Cancel</button>
        <button class="modal-btn btn-submit" onclick="submitActivation()">Submit</button>
      </div>
      <div class="key-error" id="keyError">Invalid key. Required: Admin@370</div>
    </div>
  </div>

  <!-- Predictor Screen -->
  <div class="predictor-screen" id="predictorScreen">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
    <div class="aviator-logo-box">
      <img src="aviator.png" alt="Aviator">
    </div>
    <div class="vpn-ring">
      <span class="vpn-text">Connect VPN</span>
    </div>
    <button class="start-btn" id="startBtn" onclick="startPrediction()">Start</button>
    <div class="loading-spinner" id="loadingSpinner"></div>
    <div class="error-msg" id="errorMsg">Error: VPN key required</div>

    <div class="prediction-result" id="predictionResult">
      <div class="pred-value" id="predValue">2.50x</div>
      <div class="pred-label">Predicted Multiplier</div>
      <div style="color:#4caf50; margin-top:10px; font-size:0.9rem;" id="predRound">Round #<span>--</span></div>
    </div>
  </div>

  <script>
    const sites = [
      'SportyBet', 'Betway', 'LottoStar', 'MSport', '1win', 'HollywoodBets',
      '1xBet', 'PremierBet', 'PinUpBet', 'MelBet', 'SuperBet', 'BetKing',
      'Bwin', 'WilliamHill', 'PaddyPower', 'Bet365', 'SkyBet', 'Betfair',
      '888sport', 'Unibet', 'Mwos', '22Bet', 'DafaBet', 'Betpawa',
      'Stake', 'Adjarabet', 'Cloudbet', 'Luckystar', '10BET', 'GGBET', 'SpinCity'
    ];

    function renderSites() {
      const grid = document.getElementById('sitesGrid');
      grid.innerHTML = sites.map(s => {
        const imgName = s.toLowerCase().replace(/[^a-z0-9]/g, '') + '.png';
        return `
          <div class="site-item" onclick="showActivation('${s}')">
            <img src="images/${imgName}" alt="${s}" class="site-img" onerror="this.style.display='none'; this.parentElement.style.background='rgba(229,57,53,0.1)'">
          </div>
        `;
      }).join('');
    }
    renderSites();

    let selectedSite = '';
    function showActivation(site) {
      selectedSite = site || '';
      document.getElementById('activationModal').classList.add('active');
      document.getElementById('activationInput').focus();
      document.getElementById('keyError').style.display = 'none';
    }
    function hideActivation() {
      document.getElementById('activationModal').classList.remove('active');
      document.getElementById('activationInput').value = '';
      document.getElementById('keyError').style.display = 'none';
    }
    function submitActivation() {
      const code = document.getElementById('activationInput').value.trim();
      if (code !== 'Admin@370') {
        document.getElementById('keyError').style.display = 'block';
        return;
      }
      hideActivation();
      document.getElementById('siteScreen').style.display = 'none';
      document.getElementById('predictorScreen').classList.add('active');
    }
    function goBack() {
      document.getElementById('predictorScreen').classList.remove('active');
      document.getElementById('siteScreen').style.display = 'block';
      document.getElementById('errorMsg').classList.remove('active');
      document.getElementById('loadingSpinner').classList.remove('active');
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = 'Start';
      document.querySelector('.vpn-ring').style.borderColor = '#4caf50';
      document.querySelector('.vpn-text').textContent = 'Connect VPN';
      document.querySelector('.vpn-text').style.color = '#e53935';
    }

    function startPrediction() {
      const btn = document.getElementById('startBtn');
      const spinner = document.getElementById('loadingSpinner');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Loading...';
      spinner.classList.add('active');
      errorMsg.classList.remove('active');

      document.querySelector('.vpn-ring').style.borderColor = '#8bc34a';
      document.querySelector('.vpn-text').textContent = 'Connected';
      document.querySelector('.vpn-text').style.color = '#4caf50';

      setTimeout(() => {
        spinner.classList.remove('active');
        btn.textContent = 'Start';
        btn.disabled = false;
        errorMsg.classList.add('active');
      }, 2500);
    }
  </script>
</body>
</html>
