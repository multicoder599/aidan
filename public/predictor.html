<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviator Predictor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #e50539;
      text-transform: uppercase;
    }
    .header p {
      font-size: 0.75rem;
      color: #5e6266;
      margin-top: 4px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
      background: #1b2024;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #28a909;
      animation: pulse 1.5s infinite;
    }
    .status-badge.waiting .dot { background: #f5a623; }
    .status-badge.flying .dot { background: #e50539; animation: pulse 0.6s infinite; }
    .status-badge.crashed .dot { background: #ef4444; }
    .status-badge.cooldown .dot { background: #3b82f6; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .prediction-card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #141c28, #0e1621);
      border: 1px solid rgba(229, 5, 57, 0.3);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(229,5,57,0.1);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .prediction-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #e50539, transparent);
    }
    .prediction-label {
      font-size: 0.8rem;
      color: #9ea0a3;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .prediction-value {
      font-size: 4.5rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 30px rgba(229,5,57,0.4);
      transition: all 0.3s ease;
    }
    .prediction-value.pending {
      color: #5e6266;
      text-shadow: none;
    }
    .prediction-round {
      font-size: 0.85rem;
      color: #5e6266;
      margin-top: 12px;
      font-weight: 500;
    }
    .countdown-wrap {
      width: 100%;
      max-width: 420px;
      background: #1b2024;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .countdown-label {
      font-size: 0.7rem;
      color: #5e6266;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .countdown-bar {
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, #e50539, #ff6b8a);
      border-radius: 4px;
      transition: width 0.1s linear;
      width: 100%;
    }
    .countdown-text {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
    }
    .history-section {
      width: 100%;
      max-width: 420px;
      margin-top: 8px;
    }
    .history-title {
      font-size: 0.75rem;
      color: #5e6266;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .history-row .round { color: #5e6266; font-weight: 500; }
    .history-row .mult { font-weight: 800; }
    .history-row .mult.blue { color: #41b0ee; }
    .history-row .mult.purple { color: #913ef8; }
    .history-row .mult.pink { color: #c017b4; }
    .connection-status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(0,0,0,0.6);
      border-radius: 100px;
      font-size: 0.7rem;
      color: #5e6266;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .connection-status.connected { color: #28a909; }
    .connection-status.connected .conn-dot { background: #28a909; }
    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5e6266;
    }
    .accuracy-box {
      width: 100%;
      max-width: 420px;
      background: rgba(40, 169, 9, 0.08);
      border: 1px solid rgba(40, 169, 9, 0.2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .accuracy-label {
      font-size: 0.75rem;
      color: #9ea0a3;
    }
    .accuracy-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: #28a909;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="header">
    <h1>Aviator Predictor</h1>
    <p>Next Round Intelligence</p>
  </div>

  <div class="status-badge" id="statusBadge">
    <span class="dot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="prediction-card" id="predictionCard">
    <div class="prediction-label">Predicted Multiplier</div>
    <div class="prediction-value pending" id="predictionValue">--.--</div>
    <div class="prediction-round" id="predictionRound">Waiting for game...</div>
  </div>

  <div class="countdown-wrap" id="countdownWrap" style="display:none;">
    <div class="countdown-label">Time Until Next Round</div>
    <div class="countdown-bar">
      <div class="countdown-fill" id="countdownFill"></div>
    </div>
    <div class="countdown-text" id="countdownText">5.0s</div>
  </div>

  <div class="accuracy-box">
    <span class="accuracy-label">Prediction Accuracy</span>
    <span class="accuracy-value" id="accuracyValue">--%</span>
  </div>

  <div class="history-section">
    <div class="history-title">Recent History</div>
    <div id="historyList"></div>
  </div>

  <div class="connection-status" id="connStatus">
    <span class="conn-dot"></span>
    <span>Listening for game tab...</span>
  </div>

  <script>
    const channel = new BroadcastChannel('aviator_game_channel');
    const els = {
      statusBadge: document.getElementById('statusBadge'),
      statusText: document.getElementById('statusText'),
      predictionValue: document.getElementById('predictionValue'),
      predictionRound: document.getElementById('predictionRound'),
      countdownWrap: document.getElementById('countdownWrap'),
      countdownFill: document.getElementById('countdownFill'),
      countdownText: document.getElementById('countdownText'),
      historyList: document.getElementById('historyList'),
      connStatus: document.getElementById('connStatus'),
      accuracyValue: document.getElementById('accuracyValue')
    };

    let state = { gameState: 'connecting', round: 0, prediction: null, predRound: null, countdownStart: 0 };
    let history = [];
    let correctPredictions = 0;
    let totalPredictions = 0;
    let countdownTimer = null;

    function setStatus(gameState) {
      state.gameState = gameState;
      els.statusBadge.className = 'status-badge ' + gameState;
      const labels = {
        waiting: 'Waiting for Next Round',
        flying: 'Round In Progress',
        crashed: 'Round Crashed',
        cooldown: 'Cooldown',
        connecting: 'Connecting...'
      };
      els.statusText.textContent = labels[gameState] || gameState;
    }

    function updatePrediction(value, round, source) {
      state.prediction = value;
      state.predRound = round;
      els.predictionValue.textContent = value.toFixed(2) + 'x';
      els.predictionValue.classList.remove('pending');
      els.predictionRound.textContent = `Round #${round} · ${source || 'predicted'}`;
    }

    function clearPrediction() {
      els.predictionValue.textContent = '--.--';
      els.predictionValue.classList.add('pending');
      els.predictionRound.textContent = 'Waiting for next prediction...';
      state.prediction = null;
      state.predRound = null;
    }

    function startCountdown(seconds) {
      els.countdownWrap.style.display = 'block';
      let remaining = seconds;
      const total = seconds;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        remaining -= 0.1;
        if (remaining <= 0) {
          remaining = 0;
          clearInterval(countdownTimer);
        }
        const pct = (remaining / total) * 100;
        els.countdownFill.style.width = pct + '%';
        els.countdownText.textContent = Math.max(0, remaining).toFixed(1) + 's';
      }, 100);
    }

    function stopCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      els.countdownWrap.style.display = 'none';
    }

    function addHistory(round, mult) {
      history.unshift({ round, mult });
      if (history.length > 20) history.pop();
      renderHistory();
      // Accuracy check
      if (state.prediction && state.predRound === round) {
        totalPredictions++;
        // Consider "correct" if prediction is within 15% of actual or higher
        if (state.prediction >= mult * 0.85) {
          correctPredictions++;
        }
        const acc = totalPredictions > 0 ? Math.round((correctPredictions / totalPredictions) * 100) : 0;
        els.accuracyValue.textContent = acc + '%';
      }
    }

    function renderHistory() {
      els.historyList.innerHTML = history.map(h => {
        let cls = 'mult';
        if (h.mult < 2) cls += ' blue';
        else if (h.mult < 10) cls += ' purple';
        else cls += ' pink';
        return `<div class="history-row">
          <span class="round">Round #${h.round}</span>
          <span class="${cls}">${h.mult.toFixed(2)}x</span>
        </div>`;
      }).join('');
    }

    channel.onmessage = (e) => {
      const { type, data } = e.data || {};
      if (!type) return;

      if (type === 'GAME_STATE') {
        els.connStatus.classList.add('connected');
        els.connStatus.querySelector('span:last-child').textContent = 'Connected to game';
        state.round = data.round || state.round;

        if (data.state === 'waiting') {
          setStatus('waiting');
          startCountdown(5);
        } else if (data.state === 'flying') {
          setStatus('flying');
          stopCountdown();
        } else if (data.state === 'crashed') {
          setStatus('crashed');
          stopCountdown();
          if (data.crashPoint) addHistory(data.round, data.crashPoint);
        } else if (data.state === 'cooldown') {
          setStatus('cooldown');
          stopCountdown();
        }
      }

      if (type === 'PREDICTION_UPDATE') {
        if (data && data.crashPoint && data.round) {
          updatePrediction(data.crashPoint, data.round, data.source);
        }
      }

      if (type === 'ROUND_COMPLETE') {
        if (data && data.crashPoint && data.round) {
          addHistory(data.round, data.crashPoint);
        }
      }

      if (type === 'FLYING_WITH') {
        if (data && data.crashPoint && data.round) {
          // If we didn't have a prediction, show the actual
          if (!state.prediction || state.predRound !== data.round) {
            updatePrediction(data.crashPoint, data.round, 'actual');
          }
        }
      }
    };

    // Ping to check if game is open
    setInterval(() => {
      channel.postMessage({ type: 'PING_PREDICTOR', data: { timestamp: Date.now() } });
    }, 3000);

    setStatus('connecting');
  </script>
</body>
</html>
